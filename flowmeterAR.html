<!DOCTYPE html>
<html>
<head>
    <link rel="icon" type="image/x-icon" href="favicon.png">
    <link rel="stylesheet" href="flowmeterStyles.css">
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.4.0/dist/aframe-extras.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <script src="https://unpkg.com/aframe-look-at-component@0.8.0/dist/aframe-look-at-component.min.js"></script>
    <script src="flowmeterControls.js" defer></script>
    <script src="flowmeterComponents.js"></script>
</head>
<body>
    <a-scene        
        embedded arjs='detectionMode: mono_and_matrix; matrixCodeType: 4x4_BCH_13_5_5; labelingMode: white_region;'>
        <a-assets>
            <a-asset-item id="flowmeter" src="flowmeterModel.glb"></a-asset-item>
            <a-asset-item id="chart" src="chart.glb"></a-asset-item>
            <img id="labelFlowmeter" src="labelFlowmeter.png">
            <img id="labelMagnet" src="labelMagnet.png">
            <img id="labelSensor" src="labelSensor.png">
            <img id="labelSignalOutput" src="labelSignalOutput.png">
            <img id="labelWaterIn" src="labelWaterIn.png">
            <img id="labelWaterOut" src="labelWaterOut.png">
        </a-assets>

        <a-marker type='barcode' value='3' id="myMarker" smooth="true">
            <!-- Draw/label axes to help locate objects in the scene -->
            <!-- <a-entity line="start: 0 0 0; end: 100 0 0; color: red"></a-entity>
            <a-entity line="start: 0 0 0; end: 0 100 0; color: green"></a-entity>
            <a-entity line="start: 0 0 0; end: 0 0 100; color: blue"></a-entity>

            <a-text value="+X" position="2 0 0" color="red" look-at="[camera]" side="double" scale="3 3 3"></a-text>
            <a-text value="+Y" position="0 2 0" color="green" look-at="[camera]" side="double" scale="3 3 3"></a-text>
            <a-text value="+Z" position="0 0 2" color="blue" look-at="[camera]" side="double" scale="3 3 3"></a-text> -->

            <!-- Load primary models -->
            <a-entity 
                id="entityGLBflowmeter"
                gltf-model="#flowmeter" 
                animation-mixer
                scale="50 50 50"
                rotation="0 90 0"
                position="0 0 0"
                model-opacity="meshOpacities: body-1:0.9, cap_outer-1:0.9, cap_inner-1:0.9, pcbBoard-1:0.5"
            ></a-entity>

            <a-entity 
                id="entityGLBchart"
                gltf-model="#chart" 
                animation-mixer
                scale="40 40 40"
                position="2.3 -0.2 -0.65"
                rotation="-90 90 0"
            ></a-entity>

            <!-- Labels -->
            <!-- All width/height values are adjusted in FLOWMETERCONTROLS.js; listed here are source sizes -->
            <!-- Wrapper bundles image and anchor point so that line can be offset from image center -->
            <!-- Positions:  -->
            <!--    Wrapper: where label will appear -->
            <!--    Anchor: where line will connect, placed locally within wrapper  -->
            <!--    Cylinder: starting position of line -->
            <!-- +X is down, +Y is towards camera, +Z is left, marker is size 1 -->

            <!-- FLOWMETER -->
            <a-entity id="wrapper-flowmeter" position="-3 -1 0">
                <a-image src="#labelFlowmeter" id="label-flowmeter" look-at="[camera]" width="1254" height="354"></a-image>
                <a-entity id="anchor-flowmeter" position="0.25 0 0"></a-entity>
            </a-entity>
            <a-cylinder id="line-flowmeter" position="-1.2 -1 0"></a-cylinder>

            <!-- MAGNET -->
            <a-entity id="wrapper-magnet" position="-2 0 2">
                <a-image src="#labelMagnet" id="label-magnet" look-at="[camera]" width="995" height="354"></a-image>
                <a-entity id="anchor-magnet" position="0.25 0 0"></a-entity>
            </a-entity>
            <a-cylinder id="line-magnet" position="-0.2 -0.7 0.2" material="transparent: true; depthTest: false"></a-cylinder>

            <!-- SENSOR -->
            <a-entity id="wrapper-sensor" position="1 0 2">
                <a-image src="#labelSensor" id="label-sensor" look-at="[camera]" width="932" height="354"></a-image>
                <a-entity id="anchor-sensor" position="-0.25 0 0"></a-entity>
            </a-entity>
            <a-cylinder id="line-sensor" position="0 -0.7 0.6" material="transparent: true; depthTest: false"></a-cylinder>

            <!-- CHART -->
            <a-entity id="wrapper-signal-output" position="2 0 2">
                <a-image src="#labelSignalOutput" id="label-signal-output" look-at="[camera]" width="1576" height="354"></a-image>
                <a-entity id="anchor-signal-output" position="-0.125 0 -1.1"></a-entity>
            </a-entity>
            <a-cylinder id="line-signal-output" position="1.8 -0.2 0.1"></a-cylinder>

            <!-- WATER INLET -->
            <a-entity id="wrapper-water-in" position="-1 -1 -3.5">
                <a-image src="#labelWaterIn" id="label-water-in" look-at="[camera]" width="1085" height="354"></a-image>
                <a-entity id="anchor-water-in" position="0.25 0 0"></a-entity>
            </a-entity>
            <a-cylinder id="line-water-in" position="-0.25 -1 -3.5"></a-cylinder>

            <!-- WATER OUTLET -->
            <a-entity id="wrapper-water-out" position="-1 -1 3.5">
                <a-image src="#labelWaterOut" id="label-water-out" look-at="[camera]" width="1196" height="354"></a-image>
                <a-entity id="anchor-water-out" position="0.25 0 0"></a-entity>
            </a-entity>
            <a-cylinder id="line-water-out" position="-0.25 -1 3.5"></a-cylinder>

            </a-marker>
        <a-entity camera></a-entity>   

    </a-scene>
    <!-- Control buttons -->
    <div class="slidercontainer" style="bottom:20%">
        <input type="range" min="0" max="0.99" value="0.9" class="slider" id="sliderCase" step="0.01">
        <label for="sliderCase" class="sliderLabel">Case</label>
    </div>

    <div class="slidercontainer" style="bottom:12.5%;">
        <input type="range" min="0" max="0.99" value="0.5" class="slider" id="sliderPCB" step="0.01">
        <label for="sliderPCB" class="sliderLabel">PCB</label>
    </div>

    <div class="slidercontainer" style="bottom:5%;">
        <input type="range" min="0" max="0.99" value="0.9" class="slider" id="sliderLabels" step="0.01">
        <label for="sliderLabels" class="sliderLabel">Labels</label>
    </div>
</body>
